<body>
  <div class="app-shell">
    <header class="site-navbar">
      <div class="nav-brand-wrap">
        <span class="brand-icon"><span></span><span></span></span>
        <a class="nav-brand" href="dashboard.html">AvailPlanner</a>

      <nav class="nav-main-links" aria-label="Primary">

    <main class="content-area">
      
<section>

    <button class="soft-btn" type="button">+ Add Task</button>

  <div class="table-card">

      <thead>
        <tr>
          <th>Task Name</th>

        </tr>

      <tbody>
        <tr>

        </tr>
        <tr>
          <td>Study for Midterm</td>
          <td>March 15</td>
          <td><span class="checkbox"></span></td>
        </tr>
        <tr>
          <td>Read Week 6 Notes</td>
          <td>March 18</td>
          <td><span class="checkbox checked">✓</span></td>
        </tr>
      </tbody>
    </table>

</section>

    </main>
