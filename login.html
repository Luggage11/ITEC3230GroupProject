<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Student Login - AvailPlanner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="site-navbar">
      <div class="nav-brand-wrap">
        <span class="brand-icon"><span></span><span></span></span>
        <a class="nav-brand" href="dashboard.html">AvailPlanner</a>
      </div>

      <nav class="nav-main-links" aria-label="Primary">
        <a class="nav-link" href="dashboard.html">Home</a>
        <a class="nav-link" href="tasks.html">Tasks</a>
        <a class="nav-link" href="courses.html">Courses</a>
        <a class="nav-link" href="events.html">Events</a>
        <a class="nav-link" href="settings.html">Settings</a>
      </nav>

      <a class="nav-search-btn" href="search.html" aria-label="Open search">
        <span class="search-icon"></span>
      </a>
      <a class="nav-link nav-action active account-link" href="student-login.html">Account</a>
      <a class="nav-link nav-action notifications-link" href="notifications.html">Notifications</a>
    </header>

    <main class="content-area">
      <section class="login-shell">
        <div class="section-tag">Login</div>

        <div class="form-panel">
          <div class="form-inner">
            <form class="form-grid">
              <div class="form-group">
                <label for="email">Email Address</label>
                <input class="form-input" id="email" type="email" placeholder="Enter your email" required>
              </div>

              <div class="form-group">
                <label for="password">Password</label>
                <input class="form-input" id="password" type="password" placeholder="Enter your password" required>
                <p class="helper-text">Use your student or synced email account to sign in.</p>
              </div>

              <div class="form-actions">
                <button class="soft-btn" type="submit">Login</button>
                <a class="secondary-btn" href="account.html">View Account</a>
                <a class="secondary-btn" href="search.html">Forgot Password</a>
              </div>
            </form>

            <div class="feedback-box feedback-success">
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
